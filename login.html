<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to ElectIQ — Your interactive Indian election education platform. Continue your democratic journey.">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https:; script-src 'self' https://www.googletagmanager.com https://translate.googleapis.com https://translate.google.com https://translate-pa.googleapis.com https://www.gstatic.com https://www.googleapis.com https://apis.google.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://www.gstatic.com https://translate.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self' https: 'unsafe-inline';">
  <title>Sign In — ElectIQ</title>
  <!-- body hidden until auth check to prevent flash of protected content -->
  <style>body { opacity: 0; transition: opacity 200ms ease; }</style>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/auth.css">
  <script async src="https://www.googletagmanager.com/gtag/js?id=REPLACE_GA4_ID"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());</script>
</head>
<body>



  <!-- Minimal header for login page — no nav links, just logo -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="logo-stamp" aria-label="ElectIQ Home">
        <div class="logo-circle" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="10" stroke="#7B5E3A" stroke-width="1.5" fill="none"/>
            <circle cx="12" cy="12" r="3" stroke="#7B5E3A" stroke-width="1.5" fill="none"/>
            <line x1="12" y1="2" x2="12" y2="9" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="12" y1="15" x2="12" y2="22" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="2" y1="12" x2="9" y2="12" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="15" y1="12" x2="22" y2="12" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="4.93" y1="4.93" x2="9.76" y2="9.76" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="14.24" y1="14.24" x2="19.07" y2="19.07" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="19.07" y1="4.93" x2="14.24" y2="9.76" stroke="#7B5E3A" stroke-width="1"/>
            <line x1="9.76" y1="14.24" x2="4.93" y2="19.07" stroke="#7B5E3A" stroke-width="1"/>
          </svg>
        </div>
        <span class="logo-text">Elect<span>IQ</span></span>
      </a>
      <!-- Translate widget in header on desktop -->
      <div class="header-right">
        <div id="translate-container">
          <label for="custom-translate-select" class="translate-label">Translate:</label>
          <select id="custom-translate-select" class="custom-translate-select" aria-label="Select Language">
            <option value="en">English</option>
            <option value="hi">Hindi (हिंदी)</option>
            <option value="bn">Bengali (বাংলা)</option>
            <option value="ta">Tamil (தமிழ்)</option>
            <option value="te">Telugu (తెలుగు)</option>
            <option value="mr">Marathi (मराठी)</option>
            <option value="kn">Kannada (ಕನ್ನಡ)</option>
            <option value="ml">Malayalam (മലയാളം)</option>
            <option value="gu">Gujarati (ગુજરાતી)</option>
            <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
            <option value="ur">Urdu (اردو)</option>
          </select>
          <div id="google_translate_element" style="display:none;"></div>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div class="auth-page">
      <div class="auth-card" id="auth-card" role="main">

        <!-- Card Header -->
        <div class="auth-card-header">
          <div class="auth-logo-circle" aria-hidden="true">
            <span style="font-family:var(--font-display);font-size:1.3rem;font-weight:900;color:var(--navy);">EQ</span>
          </div>
          <div class="auth-logo-text">Elect<em>IQ</em></div>
          <p class="auth-tagline">Your democratic journey begins here.</p>
          <div class="auth-tricolor" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </div>

        <!-- ── Google Sign-In ── -->
        <button class="btn-google" id="btn-google" type="button" aria-label="Continue with Google Sign-In">
          <!-- Official Google "G" logo — inline SVG, no external image -->
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span id="btn-google-text">Continue with Google</span>
        </button>

        <!-- ── OR Divider ── -->
        <div class="auth-or" aria-hidden="true">
          <span>or sign in with email</span>
        </div>

        <!-- ── Email Form ── -->
        <form class="auth-form" id="auth-form" novalidate aria-label="Email and password sign-in form">

          <!-- Display Name field (register mode only — hidden by default) -->
          <div class="auth-register-extra" id="register-extra">
            <div class="form-field">
              <label class="form-label" for="input-name">Display Name</label>
              <input
                type="text"
                class="form-input"
                id="input-name"
                name="displayName"
                placeholder="Your name (e.g. Priya Sharma)"
                autocomplete="name"
                maxlength="50"
              >
            </div>
          </div>

          <!-- Email -->
          <div class="form-field">
            <label class="form-label" for="input-email">Email Address</label>
            <input
              type="email"
              class="form-input"
              id="input-email"
              name="email"
              placeholder="you@example.com"
              autocomplete="email"
              required
            >
          </div>

          <!-- Password -->
          <div class="form-field">
            <label class="form-label" for="input-password">Password</label>
            <div class="input-password-wrap">
              <input
                type="password"
                class="form-input"
                id="input-password"
                name="password"
                placeholder="Your password"
                autocomplete="current-password"
                minlength="6"
                required
              >
              <button
                type="button"
                class="btn-pw-toggle"
                id="btn-pw-toggle"
                aria-label="Show or hide password"
                aria-pressed="false"
              >
                <!-- Eye icon (show) -->
                <svg id="icon-eye-show" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2" fill="none"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                </svg>
                <!-- Eye-off icon (hide) — hidden by default -->
                <svg id="icon-eye-hide" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="display:none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Error display -->
          <div class="auth-error" id="auth-error" role="alert" aria-live="polite"></div>

          <!-- Submit -->
          <button type="submit" class="btn-auth-submit" id="btn-submit" aria-live="polite">
            <span id="btn-submit-text">Sign In</span>
          </button>

          <!-- Toggle Sign In / Register -->
          <p class="auth-toggle-link">
            <span id="toggle-text">Don't have an account?</span>
            <button type="button" id="btn-toggle-mode" aria-live="polite">
              Register →
            </button>
          </p>

        </form>

        <!-- Email verification notice (shown after successful registration) -->
        <div class="auth-verify-notice" id="verify-notice" role="status" aria-live="polite">
          <span class="verify-icon" aria-hidden="true">✉️</span>
          <p id="verify-message">A verification email has been sent to your address. Please verify before continuing.</p>
          <button class="btn-resend" id="btn-resend" type="button">Resend Email</button>
        </div>

      </div>
    </div>
  </main>

  <!-- Firebase SDK modules -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import {
      getAuth, onAuthStateChanged,
      GoogleAuthProvider, signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile, sendEmailVerification,
      signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    window.firebaseApp       = { initializeApp };
    window.firebaseAuth      = {
      getAuth, onAuthStateChanged,
      GoogleAuthProvider, signInWithPopup,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      updateProfile, sendEmailVerification,
      signOut
    };
    window.firebaseFirestore = { getFirestore, doc, setDoc, getDoc, serverTimestamp };
  </script>

  <script src="env.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/translate.js"></script>
  <script async src="https://translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <script>
    /* ── Login page controller ─────────────────────────────────────── */
    (async () => {
      // Reveal body immediately — login page is public
      document.body.style.opacity = '1';

      // If user is already signed in, go straight to the app
      const user = await window.AuthService.initAuth();
      if (user) {
        window.location.href = 'flowmap.html';
        return;
      }

      // ── DOM References ────────────────────────────────────────────
      const btnGoogle     = document.getElementById('btn-google');
      const btnGoogleText = document.getElementById('btn-google-text');
      const form          = document.getElementById('auth-form');
      const inputName     = document.getElementById('input-name');
      const inputEmail    = document.getElementById('input-email');
      const inputPassword = document.getElementById('input-password');
      const btnSubmit     = document.getElementById('btn-submit');
      const btnSubmitText = document.getElementById('btn-submit-text');
      const btnToggle     = document.getElementById('btn-toggle-mode');
      const toggleText    = document.getElementById('toggle-text');
      const registerExtra = document.getElementById('register-extra');
      const errorEl       = document.getElementById('auth-error');
      const verifyNotice  = document.getElementById('verify-notice');
      const verifyMsg     = document.getElementById('verify-message');
      const btnResend     = document.getElementById('btn-resend');
      const pwInput       = document.getElementById('input-password');
      const pwToggle      = document.getElementById('btn-pw-toggle');
      const iconShow      = document.getElementById('icon-eye-show');
      const iconHide      = document.getElementById('icon-eye-hide');

      let isRegisterMode = false;
      let errorTimer = null;
      let pendingEmail = '';

      // ── Show / Hide Error ──────────────────────────────────────────
      const showError = (msg) => {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
        clearTimeout(errorTimer);
        errorTimer = setTimeout(() => errorEl.classList.remove('visible'), 5000);
      };

      const hideError = () => {
        errorEl.classList.remove('visible');
        clearTimeout(errorTimer);
      };

      // ── Loading State ──────────────────────────────────────────────
      const setLoading = (loading) => {
        btnGoogle.disabled  = loading;
        btnSubmit.disabled  = loading;
        btnToggle.disabled  = loading;

        if (loading) {
          btnGoogleText.innerHTML = '<span class="auth-spinner" aria-label="Loading"></span>';
          btnSubmitText.innerHTML = '<span class="auth-spinner" aria-label="Loading"></span>';
        } else {
          btnGoogleText.textContent = 'Continue with Google';
          btnSubmitText.textContent = isRegisterMode ? 'Create Account' : 'Sign In';
        }
      };

      // ── Toggle Mode ───────────────────────────────────────────────
      btnToggle.addEventListener('click', () => {
        isRegisterMode = !isRegisterMode;
        hideError();

        registerExtra.classList.toggle('expanded', isRegisterMode);
        btnSubmitText.textContent   = isRegisterMode ? 'Create Account' : 'Sign In';
        btnToggle.textContent       = isRegisterMode ? 'Sign In →' : 'Register →';
        toggleText.textContent      = isRegisterMode ? 'Already have an account?' : "Don't have an account?";
        inputPassword.autocomplete  = isRegisterMode ? 'new-password' : 'current-password';
        verifyNotice.classList.remove('visible');
      });

      // ── Password Show/Hide ─────────────────────────────────────────
      pwToggle.addEventListener('click', () => {
        const isHidden = pwInput.type === 'password';
        pwInput.type = isHidden ? 'text' : 'password';
        pwToggle.setAttribute('aria-pressed', isHidden ? 'true' : 'false');
        iconShow.style.display = isHidden ? 'none' : '';
        iconHide.style.display = isHidden ? ''     : 'none';
      });

      // Clear error on input
      [inputEmail, inputPassword, inputName].forEach(el => {
        el.addEventListener('input', hideError);
      });

      // ── Client-side email validation ───────────────────────────────
      const isValidEmail = (email) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

      // ── Post-auth redirect helper ──────────────────────────────────
      const redirectAfterAuth = () => {
        // Go to flowmap — or last saved page if stored
        const last = sessionStorage.getItem('electiq_last_page');
        window.location.href = last || 'flowmap.html';
      };

      // ── Google Sign-In ────────────────────────────────────────────
      btnGoogle.addEventListener('click', async () => {
        hideError();
        setLoading(true);
        try {
          await window.AuthService.signInWithGoogle();
          redirectAfterAuth();
        } catch (err) {
          showError(err.message);
          setLoading(false);
        }
      });

      // ── Form Submit ────────────────────────────────────────────────
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email    = inputEmail.value.trim();
        const password = inputPassword.value;
        const name     = inputName.value.trim();

        // Client-side validation
        if (!isValidEmail(email)) {
          showError('Please enter a valid email address.');
          inputEmail.focus();
          return;
        }
        if (password.length < 6) {
          showError('Password must be at least 6 characters.');
          inputPassword.focus();
          return;
        }
        if (isRegisterMode && !name) {
          showError('Please enter your display name.');
          inputName.focus();
          return;
        }

        setLoading(true);

        try {
          if (isRegisterMode) {
            await window.AuthService.registerWithEmail(email, password, name);
            pendingEmail = email;
            // Show verification notice instead of redirecting
            verifyMsg.textContent = `A verification email has been sent to ${email}. Please verify before continuing.`;
            verifyNotice.classList.add('visible');
            setLoading(false);
          } else {
            await window.AuthService.signInWithEmail(email, password);
            redirectAfterAuth();
          }
        } catch (err) {
          showError(err.message);
          setLoading(false);
        }
      });

      // ── Resend Verification ────────────────────────────────────────
      btnResend.addEventListener('click', async () => {
        btnResend.textContent = 'Sending…';
        btnResend.disabled = true;
        try {
          await window.AuthService.resendVerificationEmail();
          btnResend.textContent = 'Email sent!';
        } catch (err) {
          btnResend.textContent = 'Resend Email';
          showError(err.message);
        } finally {
          setTimeout(() => {
            btnResend.textContent = 'Resend Email';
            btnResend.disabled = false;
          }, 3000);
        }
      });

      // GA4
      const c = window.ELECTIQ_CONFIG;
      if (c && c.ga4MeasurementId && c.ga4MeasurementId !== 'YOUR_GA4_MEASUREMENT_ID') {
        gtag('config', c.ga4MeasurementId);
      }
    })();
  </script>
</body>
</html>
